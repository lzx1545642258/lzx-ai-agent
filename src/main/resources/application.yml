spring:
  application:
    name: lzx-ai-agent
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lzx_ai_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: <PASSWORD>
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
      api-key: <your api key>
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.lzx.lzxaiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

